<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="utf-8">
    <title>CarShare</title>
    <meta name="google-signin-scope" content="profile email">
    <meta name="google-signin-client_id" content="447302165124-6icusalvr0bvcq194tn0bv4epn22kbnr.apps.googleusercontent.com">
    <script src="https://apis.google.com/js/platform.js" async defer></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="script.js"></script>
  </head>

  <body>
    <div class="homelogo">
      <img src="logo.png" alt="Logo" class="img">
    </div>

    <h1 class="landingheader"> CarShare </h1>
      
    <div class="g-signin2" data-onsuccess="onSignIn"
    data-scope="https://www.googleapis.com/auth/plus.login"></div>
      <div class="data">
          <p>profile details</p>
          <img id="pic" class="img-circle" width="100" height="100"/>
          <p>email address</p>
          <p id="email" class="alert alert-danger"></p>
          <button onclick="signOut()" class="btn btn-danger">SignOut </button>
      </div>

  </body>

</html>
